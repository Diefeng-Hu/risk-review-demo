<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>风险定位标注 · AI 预标注校对</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/top-bar.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/timeline.css">
    <link rel="stylesheet" href="css/cards-flow.css">
    <link rel="stylesheet" href="css/card.css">
    <link rel="stylesheet" href="css/asr-ocr.css">
    <link rel="stylesheet" href="css/bottom-bar.css">
</head>
<body>
    <!-- 顶部操作栏 -->
    <div class="top-bar">
        <span style="color:#94a3b8;cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;" title="返回">‹</span>
        <div class="title">
            <span style="color:#1890ff;font-weight:700;flex-shrink:0;">风险定位</span>
            <span style="color:#cbd5e1;font-weight:400;flex-shrink:0;">|</span>
            <span style="font-weight:600;color:#1f2937;font-size:12px;">【模型精细化】元素_视频_保证性承诺_快手小店</span>
        </div>
        <div class="meta-group">
            <span class="meta-item">待审量 <span class="num">8,217</span></span>
            <span class="meta-item">待领取 <span class="num">8,216</span></span>
            <span class="meta-item">延时 8天9小时37分14秒</span>
            <span class="meta-item">倒计时 <span class="countdown">2398秒</span></span>
            <span class="meta-item" style="color:#1890ff;cursor:pointer;">复制会话ID</span>
        </div>
        <div class="spacer"></div>
        <button class="btn">打卡</button>
        <button class="btn">签出</button>
        <button class="btn">□ 挂起</button>
        <button class="btn btn-success" id="pass-all-btn" style="padding:3px 12px;" title="整条视频无违规，整体通过">✓ 整条通过</button>
        <button class="btn btn-primary" style="padding:3px 12px;">✎ 审核 ›</button>
        <span class="top-icon" title="项目列表">📋</span>
        <span class="top-icon" title="通知">🔔</span>
        <span class="top-icon" id="shortcut-help-btn" title="快捷键 ?">⌨</span>
        <div style="display:flex;align-items:center;gap:5px;padding-left:10px;margin-left:2px;border-left:1px solid #eef0f4;flex-shrink:0;">
            <div style="width:26px;height:26px;border-radius:50%;background:#1890ff;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;">胡</div>
            <span style="font-size:12px;color:#1f2937;cursor:pointer;white-space:nowrap;">胡耀文 ▾</span>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧：基本信息 -->
        <div class="left-panel" id="left-panel"></div>

        <!-- 中央主区 -->
        <div class="center-area">
            <!-- ASR/OCR 侧栏 -->
            <div class="ref-side" id="ref-side"></div>

            <!-- 视频 -->
            <div class="video-row">
                <div class="video-block">
                    <div class="video-container">
                        <img id="main-video-poster" src="https://picsum.photos/seed/girl01/360/640" alt="视频">
                        <div class="video-controls">
                            <div class="row row1">
                                <button class="play-btn-mini">▶</button>
                                <span class="time-display"><span id="time-current">00:00</span> <span class="total">/ 00:34</span></span>
                                <div class="video-progress" id="video-progress">
                                    <div class="vp-segments" id="vp-segments"></div>
                                    <div class="vp-fill" id="vp-fill"></div>
                                    <div class="vp-thumb" id="vp-thumb"></div>
                                </div>
                            </div>
                            <div class="row row2">
                                <span class="vc-action">截图</span>
                                <span class="vc-action">视频截取</span>
                                <span class="speed-text">2.0倍</span>
                                <span class="vc-spacer"></span>
                                <span class="vc-action" title="音量">🔊</span>
                                <span class="vc-action" title="全屏">⛶</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 工作区 -->
            <div class="center-right">
                <div class="cards-flow-wrap">
                    <div class="flow-header">
                        <div class="flow-title">
                            风险点列表（按时间排序）
                            <span style="font-size:11px;color:#999;font-weight:normal;">共 7 项</span>
                        </div>
                        <div class="filter-tabs">
                            <span class="filter-tab active" data-filter="pending">待处理 <span class="badge-num" data-count="pending">6</span></span>
                            <span class="filter-tab" data-filter="resolved">已解决 <span class="badge-num" data-count="resolved">1</span></span>
                            <span class="filter-tab" data-filter="all">全部 <span class="badge-num" data-count="all">7</span></span>
                            <span class="filter-tab" data-filter="text">画面文字 <span class="badge-num" data-count="text">2</span></span>
                            <span class="filter-tab" data-filter="voice">语音文字 <span class="badge-num" data-count="voice">3</span></span>
                            <span class="filter-tab" data-filter="scene">画面本身 <span class="badge-num" data-count="scene">2</span></span>
                            <button class="btn btn-primary" id="accept-all-btn" style="padding:3px 10px;font-size:11px;margin-left:6px;background:#52c41a;border-color:#52c41a;" title="一键接受所有待处理项">✓ 全部接受</button>
                            <button class="btn btn-primary" id="add-risk-btn" style="padding:3px 10px;font-size:11px;margin-left:6px;">+ 新增风险点</button>
                        </div>
                    </div>
                    <div class="cards-flow" id="cards-flow"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div class="bottom-status" id="bottom-status">
        <div class="hint-group">
            <span class="shortcut-btn green"><span class="k">A</span> 接受</span>
            <span class="shortcut-btn red"><span class="k">D</span> 剔除</span>
            <span class="shortcut-btn"><span class="k">E</span> 编辑</span>
            <span class="shortcut-btn"><span class="k">↑↓</span> 切换</span>
            <span class="shortcut-btn"><span class="k">?</span> 更多</span>
        </div>
        <div class="progress-stat">
            <span class="stat-text" id="stat-text">已处理 <b id="stat-done">1</b> / <b id="stat-total">7</b> · 拒绝 <b id="stat-rej">0</b></span>
            <div class="progress-bar" title="绿色=已接受，灰色=已剔除">
                <div class="fill-done" id="fill-done" style="width:14%;"></div>
                <div class="fill-rej" id="fill-rej" style="left:14%;width:0%;"></div>
            </div>
            <button class="btn btn-primary submit-btn">提交 <kbd class="kbd">C</kbd></button>
            <span class="toggle-collapse" id="bottom-status-collapse" title="隐藏底栏 (B)">▼</span>
        </div>
    </div>
    <button class="bottom-status-toggle" id="bottom-status-toggle" title="显示底栏 (B)">▲</button>

    <script src="js/data.js"></script>
    <script src="js/render.js"></script>
    <script src="js/data.js"></script>
    <script src="js/render.js"></script>
    <script src="js/state.js"></script>
    <script src="js/card-actions.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/video.js"></script>
    <script src="js/filter.js"></script>
    <script src="js/keyboard-events.js"></script>
    <script src="js/shortcut-modal.js"></script>
    <script src="js/card-add.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/merge.js"></script>
    <script src="js/ui-utils.js"></script>
</body>
</html>
